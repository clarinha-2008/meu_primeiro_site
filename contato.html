<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Atividade</title>
</head>
<body>

    <h1>Contato</h1>

    <form>
        <label>Nome:</label>
        <input type="text" id="nome" placeholder="Digite seu nome" required><br><br>

        <label for="email">E-mail:</label>
        <input type="email" id="email" placeholder="exemplo@email.com" required><br><br>

        <label for="telefone">Telefone:</label>
        <input type="number" id="telefone" placeholder="(81) 99999-9999"><br><br>

        <label for="assunto">Assunto:</label>
        <input type="text" id="assunto" placeholder="Digite o assunto"><br><br>

        <label for="mensagem">Mensagem:</label><br>
        <textarea id="mensagem" placeholder="Digite sua mensagem"></textarea><br><br>

        <input type="checkbox" id="termos" name="termos">
        <label for="termos">Aceito os termos</label><br><br>

        <button type="submit">Enviar</button>
    </form>

</body>
</html>
